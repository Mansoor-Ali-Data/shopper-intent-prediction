data:
  raw_path: data/raw/online_shoppers_intention.csv
  target_column: Revenue
  test_size: 0.20
  random_state: 42

training:
  output_dir: models
  ann_epochs: 30
  ann_batch_size: 32
  early_stopping_patience: 5

deployment:
  model_version: "1.0.0"

benchmark:
  latency_repetitions: 1000
  warmup_runs: 10

  selection:
    metric_weights:
      f1_score: 0.45
      latency: 0.30
      roc_auc: 0.15
      model_size: 0.10